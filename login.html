<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Budgeto</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-image">
      <img src="images/login.svg" alt="Login Illustration" />
    </div>
    <form class="auth-form" action="php/login.php" method="POST">
      <h1 class="logo">Budgeto</h1>
      <h2>Welcome Back</h2>

      <input type="email" name="email" placeholder="Email Address" required />
      <input type="password" name="password" placeholder="Password" required />

      <button type="submit" class="btn-primary">Login</button>

      <p class="small-text">
        Forgot password? <a href="reset-password.html">Reset here</a>
      </p>
      <p class="small-text">
        Don’t have an account? <a href="signup.html">Sign up</a>
      </p>
    </form>
  </div>
</body>
</html>
